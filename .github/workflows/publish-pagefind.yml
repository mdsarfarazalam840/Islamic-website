name: Publish Pagefind search index to GitHub Pages

# Hosts ONLY the Pagefind search index (public/pagefind/, ~43k files) on GitHub
# Pages — free, no file-count limit, no payment method, and GitHub serves the
# `Access-Control-Allow-Origin: *` header Pagefind needs to load cross-origin
# from the main site (Cloudflare Pages).
#
# This is separate from deploy.yml (the main site → Cloudflare Pages). GitHub
# Pages publishing uses the actions/deploy-pages artifact flow and does not
# touch the Cloudflare deploy.
#
# One-time setup: repo Settings → Pages → "Build and deployment" → Source =
# "GitHub Actions". Then the index is served at:
#   https://<owner>.github.io/<repo>/pagefind/

on:
  push:
    branches: [main]
    paths:
      # Rebuild the index only when the source data or the builder changes.
      - "public/data/**"
      - "scripts/build-pagefind-index.mjs"
      - ".github/workflows/publish-pagefind.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two publishes at once; let an in-progress run finish.
concurrency:
  group: pages-pagefind
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Pagefind index
        run: npm run build:pagefind
      # Serve only the index bundle. Placing it under a `pagefind/` subfolder
      # keeps the public URL as <pages-root>/pagefind/… which matches the
      # NEXT_PUBLIC_PAGEFIND_BUNDLE value.
      - name: Stage bundle for Pages
        run: |
          mkdir -p _site/pagefind
          cp -r public/pagefind/* _site/pagefind/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
