name: Versioning

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Manual bump type (overrides commit analysis)'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for existing tag
        id: check-tag
        run: |
          if git rev-parse "v$(node -p "require('./package.json').version")" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version and generate changelog
        if: steps.check-tag.outputs.tag_exists != 'true'
        id: bump
        env:
          INPUT_BUMP: ${{ github.event.inputs.bump == 'auto' && '' || github.event.inputs.bump }}
        run: node scripts/bump-version.js

      - name: Commit and tag
        if: steps.bump.outputs.new_version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push
          git push --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.new_version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.bump.outputs.changelog }}
          token: ${{ secrets.RELEASE_TOKEN }}
