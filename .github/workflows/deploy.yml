name: Deploy to GitHub Pages

# Deploys the whole site — the static Next.js export AND the Pagefind search
# index — to GitHub Pages in a single artifact. GitHub Pages has no 20k-file
# limit (only a 1 GB total cap), so the ~43k-file index ships alongside the
# site and is served same-origin at <pages-root>/pagefind/. No Cloudflare, no
# separate index workflow, no prune step.
#
# This is a *project* site, so it serves from a subpath
# (https://<owner>.github.io/<repo>/). next.config.ts reads NEXT_PUBLIC_BASE_PATH
# to prefix assets/routes accordingly.
#
# One-time setup: repo Settings -> Pages -> "Build and deployment" ->
# Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages deploy needs these; id-token is required by deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-progress run finish.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Repo name = URL subpath. Both vars are read at build time:
      #  - NEXT_PUBLIC_BASE_PATH  -> next.config.ts basePath/assetPrefix
      #  - NEXT_PUBLIC_PAGEFIND_BUNDLE -> same-origin index path (search/pagefind.ts)
      NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
      NEXT_PUBLIC_PAGEFIND_BUNDLE: /${{ github.event.repository.name }}/pagefind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Build the search index first, then the static site. build:pagefind
      # writes public/pagefind/, which `next build` copies into out/pagefind/.
      - run: npm run build:pagefind
      - run: npm run build
      # Jekyll (GitHub Pages' default) ignores files/dirs starting with "_",
      # which would drop Next's _next/ asset folder. Disable it.
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
      - id: deployment
        uses: actions/deploy-pages@v4
